<div class="screen" id="screen-emotional">
<div class="wrap">
  <div class="emo-hdr">
    <div class="back" onclick="goBack()">←</div>
    <div style="flex:1">
      <div class="tag" style="color:var(--teal)" data-i18n="auto_41">APOYO EMOCIONAL</div>
      <div style="font-size:16px;font-weight:700" id="emo-screen-title" data-i18n="auto_42">Mi ser de apoyo</div>
    </div>
    <div style="font-size:28px" id="emo-screen-icon">🐾</div>
  </div>
  <div class="emo-body">

    <!-- Foto del ser de apoyo -->
    <div style="text-align:center;padding:8px 0">
      <div class="emo-img-circle" id="emo-circle" onclick="openLightbox(C.imgPet||'', C.petName||'')">
        <img id="emo-pet-photo" src="" style="display:none">
        <span id="emo-pet-emoji">🐾</span>
      </div>
      <div class="emo-name" id="emo-pet-display-name">—</div>
    </div>

    <!-- Mensaje de contención -->
    <div class="card" style="border-color:var(--teal)">
      <div class="card-hd" id="emo-card-hd" data-i18n="auto_43">💌 Está contigo ahora mismo</div>
      <div class="card-bd">
        <div id="emo-message" style="font-size:16px;color:var(--text2);line-height:1.75;text-align:center" data-i18n="auto_44">Aunque no esté físicamente aquí, su energía viaja contigo. Pronto volverás a casa.</div>
      </div>
    </div>

    <!-- Imagen generada por IA -->
    <div class="card">
      <div class="card-hd" data-i18n="auto_45">✨ Recreado con IA — solo para ti</div>
      <div id="emo-ai-img-wrap" class="emo-ai-img-wrap">
        <div style="padding:24px;text-align:center;color:var(--text3);font-size:14px" id="emo-ai-placeholder" data-i18n="auto_46">Toca el botón para que la IA genere una imagen de tu ser de apoyo mostrándote amor 🤍</div>
      </div>
      <div style="padding:12px 14px">
        <button class="emo-gen-btn" onclick="generateEmotionalImage()" data-i18n="auto_47">✨ Generar imagen de apoyo con IA</button>
        <div id="emo-gen-loading" style="display:none;text-align:center;padding:12px;font-size:13px;color:var(--text3);font-family:var(--mono)" data-i18n="auto_48">Generando imagen…</div>
      </div>
    </div>

    <div class="spacer"></div>
  </div>
</div>
</div>
